<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALVIKRAF - Tots els cursos</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <header class="header">
        <div class="logo-container">
            <a href="index.html" class="logo-link">
                <img src="assets/icons/logo.png" alt="ALVIKRAF" class="logo">
            </a>
        </div>
        <div class="search-container">
            <input type="text" placeholder="Cercar...">
            <button>🔍</button>
        </div>
    </header>
    <main class="catalogo-container">
        <h2 class="catalogo-titulo">Tots els cursos</h2>
        <div class="todos-cursos">
            <section class="bloques-cursos info-block">
                <h3>Àrea Informàtica</h3>
                <div class="botones-cursos">
                    <button class="curso web" onclick="window.location.href='curs-detall.html'">Aplicacions Web</button>
                    <button class="curso js" onclick="window.location.href='curs-detall.html'">JavaScript Modern</button>
                    <button class="curso sql" onclick="window.location.href='curs-detall.html'">Bases de Dades SQL</button>
                    <button class="curso digital" onclick="window.location.href='curs-detall.html'">Digitalització</button>
                    <button class="curso cyber" onclick="window.location.href='curs-detall.html'">Ciberseguretat Bàsica</button>
                    <button class="curso html" onclick="window.location.href='curs-detall.html'">HTML i CSS Complet</button>
                </div>
            </section>
            <section class="bloques-cursos lenguas-block">
                <h3>Àrea Llengües</h3>
                <div class="botones-cursos">
                    <button class="curso eng1" onclick="window.location.href='curs-detall.html'">Anglès Tècnic</button>
                    <button class="curso eng2" onclick="window.location.href='curs-detall.html'">Anglès</button>
                    <button class="curso ale" onclick="window.location.href='curs-detall.html'">Alemany</button>
                    <button class="curso fra" onclick="window.location.href='curs-detall.html'">Francès</button>
                    <button class="curso cat" onclick="window.location.href='curs-detall.html'">Català</button>
                    <button class="curso examen" onclick="window.location.href='curs-detall.html'">Preparació d'Exàmens Oficials</button>
                </div>
            </section>
            <section class="bloques-cursos ciencias-block">
                <h3>Àrea Ciències</h3>
                <div class="botones-cursos1">
                    <button class="curso mates" onclick="window.location.href='curs-detall.html'">Matemàtiques</button>
                    <button class="curso estadistica" onclick="window.location.href='curs-detall.html'">Estadística Aplicada</button>
                    <button class="curso fisica" onclick="window.location.href='curs-detall.html'">Física per a Videojocs</button>
                </div>
            </section>
        </div>
    </main>
    <footer class="footer">
        <p>Troba la formació ideal per al teu futur en el nostre catàleg complet de cursos.</p>
        <div class="botones-footer">
            <a href="sobre-nosaltres.html" class="footer-boton">Més informació</a>
            <a href="contacte.html" class="footer-boton">Contacta amb nosaltres</a>
        </div>
    </footer>
</body>
</html>
